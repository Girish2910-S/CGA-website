<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Transformations Playground</title>
<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop') no-repeat center center fixed;
    background-size: cover;
    color: white;
    overflow: hidden;
  }

  h1 {
    text-align: center;
    margin-top: 10px;
  }

  .controls {
    position: absolute;
    bottom: 30px;
    right: 30px;
    background: rgba(255, 255, 255, 0.1);
    padding: 20px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(255, 255, 255, 0.2);
  }

  select, button, input {
    margin: 5px;
    padding: 10px 15px;
    font-size: 14px;
    background: rgba(255, 255, 255, 0.2);
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  select option {
    background: #203a43;
    color: white;
  }

  button:hover, select:hover, input:hover {
    background: rgba(255, 255, 255, 0.3);
    transform: translateY(-2px);
  }

  button:active, select:active, input:active {
    transform: translateY(1px);
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
  }

  input {
    width: 60px;
    padding: 8px;
  }

  .scene {
    width: 250px;
    height: 250px;
    margin: 100px auto;
    perspective: 800px;
    position: relative;
  }

  .shape {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
  }

  .face {
    position: absolute;
    width: 200px;
    height: 200px;
    background: rgba(0,150,255,0.7);
    border: 1px solid cyan;
  }

  .front  { transform: translateZ(100px); }
  .back   { transform: rotateY(180deg) translateZ(100px); }
  .left   { transform: rotateY(-90deg) translateZ(100px); }
  .right  { transform: rotateY(90deg) translateZ(100px); }
  .top    { transform: rotateX(90deg) translateZ(100px); }
  .bottom { transform: rotateX(-90deg) translateZ(100px); }

  .square-container, .rectangle, .circle, .triangle {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .square-container {
    width: 200px;
    height: 200px;
    transform-style: preserve-3d;
  }

  .grid-wall {
    position: absolute;
    width: 200px;
    height: 200px;
    background-size: 20px 20px;
    border: 1px solid rgba(255, 255, 255, 0.2);
  }

  .grid-left {
    background-image: 
      linear-gradient(rgba(255, 0, 150, 0.7) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 0, 150, 0.7) 1px, transparent 1px);
    transform: rotateY(90deg) translateZ(-100px);
  }

  .grid-right {
    background-image: 
      linear-gradient(rgba(0, 255, 150, 0.7) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 255, 150, 0.7) 1px, transparent 1px);
    transform: translateZ(-100px);
  }

  .grid-bottom {
    background-image: 
      linear-gradient(rgba(0, 150, 255, 0.7) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 150, 255, 0.7) 1px, transparent 1px);
    transform: rotateX(90deg) translateZ(-100px);
  }

  .rectangle {
    width: 200px;
    height: 120px;
    background: rgba(255,100,100,0.8);
  }

  .circle {
    width: 200px;
    height: 200px;
    background: rgba(255,100,100,0.8);
    border-radius: 50%;
  }

  .triangle {
    width: 0;
    height: 0;
    border-left: 100px solid transparent;
    border-right: 100px solid transparent;
    border-bottom: 200px solid rgba(255,100,100,0.8);
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .axis { position: absolute; }
  .x-axis { width: 300px; height: 2px; background: red; top: 50%; left: -50px; }
  .y-axis { width: 2px; height: 300px; background: green; left: 50%; top: -50px; }
  .z-axis { width: 2px; height: 200px; background: blue; left: 50%; top: 25%; transform: rotateX(90deg); }

  /* ── Coordinate Panel ── */
  #coord-panel {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 14px;
    padding: 16px 20px;
    min-width: 260px;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  #coord-panel h3 {
    margin: 0 0 10px 0;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
    font-family: 'Segoe UI', sans-serif;
  }

  .coord-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 6px 0;
  }

  .coord-label {
    width: 70px;
    color: rgba(255,255,255,0.5);
    font-size: 11px;
    letter-spacing: 1px;
  }

  .coord-block {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .coord-val {
    display: inline-block;
    min-width: 44px;
    text-align: right;
    padding: 3px 8px;
    border-radius: 5px;
    font-weight: bold;
    font-size: 13px;
    transition: background 0.3s;
  }

  .coord-val.x { background: rgba(255,80,80,0.25); color: #ff8888; }
  .coord-val.y { background: rgba(80,255,80,0.25); color: #88ff88; }
  .coord-val.z { background: rgba(80,150,255,0.25); color: #88bbff; }

  .arrow {
    color: rgba(255,255,255,0.35);
    font-size: 14px;
  }

  .coord-val.changed {
    animation: flash 0.5s ease;
  }

  @keyframes flash {
    0%   { filter: brightness(2.5); }
    100% { filter: brightness(1); }
  }

  .divider {
    border: none;
    border-top: 1px solid rgba(255,255,255,0.1);
    margin: 10px 0;
  }

  .op-label {
    font-size: 11px;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  #last-op {
    color: #ffd580;
    font-size: 12px;
    font-family: 'Segoe UI', sans-serif;
    margin-top: 8px;
    min-height: 16px;
  }
</style>
</head>

<body>

<h1>3D Playground</h1>

<!-- ── Coordinate Panel ── -->
<div id="coord-panel">
  <h3>📐 Coordinates</h3>

  <div class="op-label">Before</div>
  <div class="coord-row">
    <span class="coord-label">Translate</span>
    <div class="coord-block">
      <span class="coord-val x" id="bef-x">0</span>
      <span class="coord-val y" id="bef-y">0</span>
      <span class="coord-val z" id="bef-z">0</span>
    </div>
  </div>
  <div class="coord-row">
    <span class="coord-label">Rotate</span>
    <div class="coord-block">
      <span class="coord-val x" id="bef-rx">0°</span>
      <span class="coord-val y" id="bef-ry">0°</span>
    </div>
  </div>
  <div class="coord-row">
    <span class="coord-label">Scale</span>
    <div class="coord-block">
      <span class="coord-val z" id="bef-sc">1.0</span>
    </div>
  </div>

  <hr class="divider">

  <div class="op-label">After &nbsp;<span class="arrow">↓</span></div>
  <div class="coord-row">
    <span class="coord-label">Translate</span>
    <div class="coord-block">
      <span class="coord-val x" id="aft-x">0</span>
      <span class="coord-val y" id="aft-y">0</span>
      <span class="coord-val z" id="aft-z">0</span>
    </div>
  </div>
  <div class="coord-row">
    <span class="coord-label">Rotate</span>
    <div class="coord-block">
      <span class="coord-val x" id="aft-rx">0°</span>
      <span class="coord-val y" id="aft-ry">0°</span>
    </div>
  </div>
  <div class="coord-row">
    <span class="coord-label">Scale</span>
    <div class="coord-block">
      <span class="coord-val z" id="aft-sc">1.0</span>
    </div>
  </div>

  <div id="last-op"></div>
</div>

<div class="scene">
  <div class="axis x-axis"></div>
  <div class="axis y-axis"></div>
  <div class="axis z-axis"></div>
  <div id="shape" class="shape"></div>
</div>

<div class="controls">
  <select onchange="changeShape(this.value)">
    <option value="cube">Cube</option>
    <option value="square">Square</option>
    <option value="rectangle">Rectangle</option>
    <option value="circle">Circle</option>
    <option value="triangle">Triangle</option>
  </select><br>

  <button onclick="rotate()">Rotate</button>
  <button onclick="scaleUp()">Scale +</button>
  <button onclick="scaleDown()">Scale -</button>
  <button onclick="move()">Translate</button><br>

  X:<input type="number" id="inputX" value="0">
  Y:<input type="number" id="inputY" value="0">
  Z:<input type="number" id="inputZ" value="0"><br>

  <button onclick="setCoordinates()">Set Coordinates</button>
  <button onclick="resetAll()">Reset</button>
</div>

<script>
  let shape = document.getElementById("shape");
  let x=0, y=0, z=0, rx=0, ry=0, scale=1;

  createCube();
  updatePanel("Init", x, y, z, rx, ry, scale);
  applyTransform();

  /* ── Shape Creators ── */
  function createCube(){
    shape.innerHTML = `
      <div class="face front"></div><div class="face back"></div>
      <div class="face left"></div><div class="face right"></div>
      <div class="face top"></div><div class="face bottom"></div>`;
  }
  function createSquare(){
    shape.innerHTML = `
      <div class="square-container">
        <div class="grid-wall grid-left"></div>
        <div class="grid-wall grid-right"></div>
        <div class="grid-wall grid-bottom"></div>
      </div>`;
    rx = -20; ry = -45;
  }
  function createRectangle(){ shape.innerHTML = `<div class="rectangle"></div>`; }
  function createCircle(){ shape.innerHTML = `<div class="circle"></div>`; }
  function createTriangle(){ shape.innerHTML = `<div class="triangle"></div>`; }

  function changeShape(type){
    const prev = snapshot();
    resetState();
    if(type==="cube")       createCube();
    if(type==="square")     createSquare();
    if(type==="rectangle")  createRectangle();
    if(type==="circle")     createCircle();
    if(type==="triangle")   createTriangle();
    updatePanel(`Shape → ${type}`, prev.x, prev.y, prev.z, prev.rx, prev.ry, prev.scale);
    applyTransform();
  }

  /* ── Core transform ── */
  function applyTransform(){
    shape.style.transform =
      `translate3d(${x}px,${y}px,${z}px) scale(${scale}) rotateX(${rx}deg) rotateY(${ry}deg)`;
  }

  function snapshot(){
    return { x, y, z, rx, ry, scale };
  }

  /* ── Before/After panel ── */
  function updatePanel(opName, bx, by, bz, brx, bry, bsc){
    // Before
    setText("bef-x",  bx);
    setText("bef-y",  by);
    setText("bef-z",  bz);
    setText("bef-rx", brx + "°");
    setText("bef-ry", bry + "°");
    setText("bef-sc", parseFloat(bsc).toFixed(1));

    // After
    flashSet("aft-x",  x);
    flashSet("aft-y",  y);
    flashSet("aft-z",  z);
    flashSet("aft-rx", rx + "°");
    flashSet("aft-ry", ry + "°");
    flashSet("aft-sc", parseFloat(scale).toFixed(1));

    document.getElementById("last-op").textContent = opName ? `⚡ ${opName}` : "";
  }

  function setText(id, val){
    document.getElementById(id).textContent = val;
  }

  function flashSet(id, val){
    const el = document.getElementById(id);
    const display = typeof val === "number" ? val : val;
    if(el.textContent !== String(display)){
      el.textContent = display;
      el.classList.remove("changed");
      void el.offsetWidth; // reflow to restart animation
      el.classList.add("changed");
    } else {
      el.textContent = display;
    }
  }

  /* ── Operations ── */
  function rotate(){
    const prev = snapshot();
    rx += 30; ry += 30;
    updatePanel("Rotate (+30° X, +30° Y)", prev.x, prev.y, prev.z, prev.rx, prev.ry, prev.scale);
    applyTransform();
  }

  function scaleUp(){
    const prev = snapshot();
    scale = Math.round((scale + 0.2) * 10) / 10;
    updatePanel("Scale Up (+0.2)", prev.x, prev.y, prev.z, prev.rx, prev.ry, prev.scale);
    applyTransform();
  }

  function scaleDown(){
    const prev = snapshot();
    scale = Math.max(0.1, Math.round((scale - 0.2) * 10) / 10);
    updatePanel("Scale Down (−0.2)", prev.x, prev.y, prev.z, prev.rx, prev.ry, prev.scale);
    applyTransform();
  }

  function move(){
    const prev = snapshot();
    x += 20; y += 20;
    updatePanel("Translate (+20px X, +20px Y)", prev.x, prev.y, prev.z, prev.rx, prev.ry, prev.scale);
    applyTransform();
  }

  function setCoordinates(){
    const prev = snapshot();
    x = parseInt(document.getElementById("inputX").value) || 0;
    y = parseInt(document.getElementById("inputY").value) || 0;
    z = parseInt(document.getElementById("inputZ").value) || 0;
    updatePanel("Set Coordinates", prev.x, prev.y, prev.z, prev.rx, prev.ry, prev.scale);
    applyTransform();
  }

  function resetState(){ x=0; y=0; z=0; rx=0; ry=0; scale=1; }

  function resetAll(){
    const prev = snapshot();
    resetState();
    updatePanel("Reset", prev.x, prev.y, prev.z, prev.rx, prev.ry, prev.scale);
    applyTransform();
  }

  /* ── Mouse drag rotation ── */
  let isDragging = false;
  let previousMousePosition = { x: 0, y: 0 };

  document.addEventListener('mousedown', (e) => {
    if (!e.target.closest('.controls') && !e.target.closest('#coord-panel')) {
      isDragging = true;
    }
  });
  document.addEventListener('mouseup', () => { isDragging = false; });
  document.addEventListener('mousemove', (e) => {
    if (isDragging) {
      const prev = snapshot();
      let dx = e.offsetX - previousMousePosition.x;
      let dy = e.offsetY - previousMousePosition.y;
      rx -= dy * 0.5;
      ry += dx * 0.5;
      updatePanel("Mouse Drag", prev.x, prev.y, prev.z, prev.rx, prev.ry, prev.scale);
      applyTransform();
    }
    previousMousePosition = { x: e.offsetX, y: e.offsetY };
  });
</script>
</body>
</html>
