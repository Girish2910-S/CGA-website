<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>AXIOM – 3D Transformations Playground</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap');

  :root {
    --bg-dark: #050a10;
    --grid-major: rgba(0,180,255,0.18);
    --grid-minor: rgba(0,120,200,0.08);
    --axis-x: #ff4466;
    --axis-y: #44ff88;
    --axis-z: #4488ff;
    --panel-bg: rgba(5,15,28,0.82);
    --panel-border: rgba(0,180,255,0.22);
    --accent: #00ccff;
    --text-dim: rgba(180,220,255,0.5);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Exo 2', sans-serif;
    background: var(--bg-dark);
    color: #cde8ff;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* ── Cosmic AutoCAD Background ── */
  #bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* ── Title ── */
  h1 {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    margin: 0;
    font-family: 'Share Tech Mono', monospace;
    font-size: 17px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--accent);
    text-shadow: 0 0 18px rgba(0,200,255,0.6);
    z-index: 10;
    pointer-events: none;
  }

  /* ── Scene ── */
  .scene {
    width: 200px;
    height: 200px;
    margin: 0;
    perspective: 900px;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 5;
  }

  .shape {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.05s linear;
  }

  /* ── Cube faces ── */
  .face {
    position: absolute;
    width: 80px;
    height: 80px;
    background: rgba(0,160,255,0.18);
    border: 1px solid rgba(0,200,255,0.7);
    box-shadow: inset 0 0 20px rgba(0,200,255,0.12), 0 0 8px rgba(0,200,255,0.2);
  }
  .front  { transform: translateZ(40px); }
  .back   { transform: rotateY(180deg) translateZ(40px); }
  .left   { transform: rotateY(-90deg) translateZ(40px); }
  .right  { transform: rotateY(90deg) translateZ(40px); }
  .top    { transform: rotateX(90deg) translateZ(40px); }
  .bottom { transform: rotateX(-90deg) translateZ(40px); }

  /* ── Square (3-wall grid) ── */
  .square-container {
    position: absolute;
    width: 90px;
    height: 90px;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    transform-style: preserve-3d;
  }
  .grid-wall {
    position: absolute;
    width: 90px;
    height: 90px;
    background-size: 15px 15px;
    border: 1px solid rgba(255,255,255,0.15);
  }
  .grid-left {
    background-image:
      linear-gradient(rgba(255,0,150,0.6) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,0,150,0.6) 1px, transparent 1px);
    transform: rotateY(90deg) translateZ(-45px);
  }
  .grid-right {
    background-image:
      linear-gradient(rgba(0,255,150,0.6) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,150,0.6) 1px, transparent 1px);
    transform: translateZ(-45px);
  }
  .grid-bottom {
    background-image:
      linear-gradient(rgba(0,150,255,0.6) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,150,255,0.6) 1px, transparent 1px);
    transform: rotateX(90deg) translateZ(-45px);
  }

  /* ── 2D Shapes ── */
  .rectangle {
    position: absolute; top: 50%; left: 50%;
    width: 100px; height: 60px;
    background: rgba(255,80,100,0.25);
    border: 2px solid rgba(255,100,120,0.9);
    box-shadow: 0 0 14px rgba(255,80,100,0.4);
    transform: translate(-50%,-50%);
  }
  .circle {
    position: absolute; top: 50%; left: 50%;
    width: 90px; height: 90px;
    background: rgba(255,80,100,0.2);
    border: 2px solid rgba(255,120,140,0.9);
    border-radius: 50%;
    box-shadow: 0 0 14px rgba(255,80,100,0.4);
    transform: translate(-50%,-50%);
  }
  .triangle-wrap {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    width: 0; height: 0;
    border-left: 50px solid transparent;
    border-right: 50px solid transparent;
    border-bottom: 86px solid rgba(255,100,100,0.7);
    filter: drop-shadow(0 0 8px rgba(255,80,100,0.6));
  }

  /* ── Axes ── */
  .axis-line {
    position: absolute;
    top: 50%; left: 50%;
    transform-origin: 0 0;
  }
  .ax-x { width: 120px; height: 2px; background: linear-gradient(90deg, var(--axis-x), transparent); transform: translateY(-1px); }
  .ax-x-neg { width: 120px; height: 2px; background: linear-gradient(-90deg, var(--axis-x), transparent); transform: translateY(-1px) rotate(180deg); }
  .ax-y { width: 2px; height: 120px; background: linear-gradient(180deg, transparent, var(--axis-y)); transform: translateX(-1px) rotate(0deg); top: calc(50% - 120px); left: 50%; }
  .ax-y2 { width: 2px; height: 120px; background: linear-gradient(0deg, transparent, var(--axis-y)); transform: translateX(-1px); }
  .ax-z { width: 100px; height: 2px; background: linear-gradient(90deg, var(--axis-z), transparent); transform: translateY(-1px) rotateY(0deg) rotate(-30deg); }
  .ax-z-neg { width: 100px; height: 2px; background: linear-gradient(-90deg, var(--axis-z), transparent); transform: translateY(-1px) rotate(150deg); }

  .axis-label {
    position: absolute;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    font-weight: bold;
    pointer-events: none;
  }
  .lbl-x  { color: var(--axis-x); top: 50%; left: calc(50% + 125px); transform: translateY(-50%); }
  .lbl-y  { color: var(--axis-y); top: calc(50% - 130px); left: calc(50% - 6px); }
  .lbl-z  { color: var(--axis-z); top: calc(50% - 50px); left: calc(50% + 80px); }

  /* ── Panels ── */
  .panel {
    position: absolute;
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    border-radius: 10px;
    padding: 14px 18px;
    backdrop-filter: blur(16px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
    z-index: 10;
  }

  /* Coord panel */
  #coord-panel {
    top: 60px;
    left: 18px;
    min-width: 250px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
  }
  #coord-panel h3 {
    margin: 0 0 10px;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    font-family: 'Exo 2', sans-serif;
    font-weight: 600;
  }
  .coord-row { display: flex; align-items: center; gap: 8px; margin: 5px 0; }
  .coord-label { width: 68px; color: var(--text-dim); font-size: 10px; letter-spacing: 1px; }
  .coord-val {
    display: inline-block; min-width: 42px; text-align: right;
    padding: 2px 7px; border-radius: 4px; font-weight: bold; font-size: 12px;
    transition: background 0.3s;
  }
  .coord-val.x { background: rgba(255,68,102,0.2); color: #ff8899; }
  .coord-val.y { background: rgba(68,255,136,0.2); color: #88ffaa; }
  .coord-val.z { background: rgba(68,136,255,0.2); color: #88bbff; }
  .coord-val.changed { animation: flash 0.5s ease; }
  @keyframes flash { 0% { filter: brightness(3); } 100% { filter: brightness(1); } }
  .divider { border: none; border-top: 1px solid rgba(0,180,255,0.15); margin: 8px 0; }
  .op-label { font-size: 10px; letter-spacing: 1.5px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 5px; }
  #last-op { color: #ffd580; font-size: 11px; font-family: 'Exo 2', sans-serif; margin-top: 8px; min-height: 14px; }

  /* Controls panel */
  #ctrl-panel {
    bottom: 20px;
    right: 18px;
    width: 310px;
  }
  #ctrl-panel h3 {
    margin: 0 0 12px;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    font-family: 'Exo 2', sans-serif;
    font-weight: 600;
  }

  .ctrl-row { display: flex; align-items: center; gap: 6px; margin: 6px 0; flex-wrap: wrap; }
  .ctrl-label { width: 60px; font-size: 11px; color: var(--text-dim); letter-spacing: 1px; font-family: 'Share Tech Mono', monospace; }

  select, button, input[type=number] {
    font-family: 'Exo 2', sans-serif;
    font-size: 12px;
    background: rgba(0,150,220,0.12);
    color: #cde8ff;
    border: 1px solid rgba(0,180,255,0.25);
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.2s;
    outline: none;
  }
  select { padding: 7px 10px; width: 100%; }
  select option { background: #071525; }
  button {
    padding: 6px 11px;
    font-size: 11px;
    letter-spacing: 0.5px;
  }
  button:hover { background: rgba(0,180,255,0.25); border-color: var(--accent); color: #fff; box-shadow: 0 0 8px rgba(0,200,255,0.3); }
  button.danger { background: rgba(255,60,80,0.12); border-color: rgba(255,80,100,0.3); color: #ff8899; }
  button.danger:hover { background: rgba(255,60,80,0.28); color: #fff; }
  input[type=number] {
    width: 54px;
    padding: 5px 6px;
    text-align: center;
  }
  input[type=number]:focus { border-color: var(--accent); background: rgba(0,180,255,0.18); }

  .translate-grid {
    display: grid;
    grid-template-columns: auto repeat(3,1fr) auto;
    gap: 5px;
    align-items: center;
    margin: 8px 0;
  }
  .translate-grid .axis-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    text-align: center;
    padding: 3px 0;
    border-radius: 3px;
  }
  .tag-x { color: var(--axis-x); }
  .tag-y { color: var(--axis-y); }
  .tag-z { color: var(--axis-z); }

  .translate-grid button {
    text-align: center;
    padding: 5px 8px;
    font-size: 14px;
    line-height: 1;
  }
  .translate-grid input {
    width: 46px;
    padding: 4px;
  }

  .sep { border-top: 1px solid rgba(0,180,255,0.12); margin: 10px 0 8px; }

  /* Drag hint */
  #drag-hint {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 2px;
    z-index: 10;
    pointer-events: none;
    font-family: 'Share Tech Mono', monospace;
  }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<h1>3D Playground</h1>

<!-- Coord Panel -->
<div id="coord-panel" class="panel">
  <h3>📐 Transform State</h3>

  <div class="op-label">Before</div>
  <div class="coord-row">
    <span class="coord-label">Translate</span>
    <span class="coord-val x" id="bef-x">0</span>
    <span class="coord-val y" id="bef-y">0</span>
    <span class="coord-val z" id="bef-z">0</span>
  </div>
  <div class="coord-row">
    <span class="coord-label">Rotate</span>
    <span class="coord-val x" id="bef-rx">0°</span>
    <span class="coord-val y" id="bef-ry">0°</span>
  </div>
  <div class="coord-row">
    <span class="coord-label">Scale</span>
    <span class="coord-val z" id="bef-sc">1.0</span>
  </div>

  <hr class="divider">

  <div class="op-label">After</div>
  <div class="coord-row">
    <span class="coord-label">Translate</span>
    <span class="coord-val x" id="aft-x">0</span>
    <span class="coord-val y" id="aft-y">0</span>
    <span class="coord-val z" id="aft-z">0</span>
  </div>
  <div class="coord-row">
    <span class="coord-label">Rotate</span>
    <span class="coord-val x" id="aft-rx">0°</span>
    <span class="coord-val y" id="aft-ry">0°</span>
  </div>
  <div class="coord-row">
    <span class="coord-label">Scale</span>
    <span class="coord-val z" id="aft-sc">1.0</span>
  </div>

  <div id="last-op"></div>
</div>

<!-- Scene -->
<div class="scene">
  <!-- Axes -->
  <div class="axis-line ax-x"></div>
  <div class="axis-line ax-x-neg"></div>
  <div class="axis-line ax-y"></div>
  <div class="axis-line ax-y2"></div>
  <div class="axis-line ax-z"></div>
  <div class="axis-line ax-z-neg"></div>
  <span class="axis-label lbl-x">X</span>
  <span class="axis-label lbl-y">Y</span>
  <span class="axis-label lbl-z">Z</span>
  <!-- Shape -->
  <div id="shape" class="shape"></div>
</div>

<!-- Controls Panel -->
<div id="ctrl-panel" class="panel">
  <h3>⚙ Controls</h3>

  <div class="ctrl-row">
    <span class="ctrl-label">Shape</span>
    <select onchange="changeShape(this.value)" style="flex:1">
      <option value="cube">Cube</option>
      <option value="square">Grid Square</option>
      <option value="rectangle">Rectangle</option>
      <option value="circle">Circle</option>
      <option value="triangle">Triangle</option>
    </select>
  </div>

  <div class="sep"></div>

  <!-- Translate XYZ individually -->
  <div class="op-label">Translate</div>
  <div class="translate-grid">
    <span class="axis-tag tag-x">X</span>
    <button onclick="translate('x',-20)">◀ −20</button>
    <input type="number" id="stepX" value="20" title="Step">
    <button onclick="translateCustom('x')">Set</button>
    <button onclick="translate('x',20)">+20 ▶</button>

    <span class="axis-tag tag-y">Y</span>
    <button onclick="translate('y',-20)">▲ −20</button>
    <input type="number" id="stepY" value="20" title="Step">
    <button onclick="translateCustom('y')">Set</button>
    <button onclick="translate('y',20)">+20 ▼</button>

    <span class="axis-tag tag-z">Z</span>
    <button onclick="translate('z',-20)">⊙ −20</button>
    <input type="number" id="stepZ" value="20" title="Step">
    <button onclick="translateCustom('z')">Set</button>
    <button onclick="translate('z',20)">+20 ⊙</button>
  </div>

  <div class="sep"></div>

  <div class="ctrl-row">
    <span class="ctrl-label">Rotate</span>
    <button onclick="rotate('x', -30)">X −30°</button>
    <button onclick="rotate('x', 30)">X +30°</button>
    <button onclick="rotate('y', -30)">Y −30°</button>
    <button onclick="rotate('y', 30)">Y +30°</button>
  </div>

  <div class="ctrl-row">
    <span class="ctrl-label">Scale</span>
    <button onclick="scaleShape(-0.2)">− 0.2</button>
    <button onclick="scaleShape(0.2)">+ 0.2</button>
  </div>

  <div class="sep"></div>
  <div class="ctrl-row">
    <button class="danger" onclick="resetAll()" style="flex:1">↺ Reset All</button>
  </div>
</div>

<div id="drag-hint">DRAG TO ROTATE · SCROLL TO ZOOM</div>

<script>
/* ─── Background: Cosmic AutoCAD Grid ─── */
(function(){
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');

  function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    draw();
  }

  function draw(){
    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0,0,W,H);

    // Deep space gradient
    const bg = ctx.createRadialGradient(W/2,H/2,0, W/2,H/2,Math.max(W,H)*0.75);
    bg.addColorStop(0, '#0a1628');
    bg.addColorStop(0.4, '#060e1a');
    bg.addColorStop(1, '#020509');
    ctx.fillStyle = bg;
    ctx.fillRect(0,0,W,H);

    // Nebula glow 1
    const nb1 = ctx.createRadialGradient(W*0.2, H*0.3, 0, W*0.2, H*0.3, W*0.35);
    nb1.addColorStop(0, 'rgba(0,80,180,0.13)');
    nb1.addColorStop(1, 'transparent');
    ctx.fillStyle = nb1; ctx.fillRect(0,0,W,H);

    // Nebula glow 2
    const nb2 = ctx.createRadialGradient(W*0.8, H*0.7, 0, W*0.8, H*0.7, W*0.3);
    nb2.addColorStop(0, 'rgba(40,0,120,0.12)');
    nb2.addColorStop(1, 'transparent');
    ctx.fillStyle = nb2; ctx.fillRect(0,0,W,H);

    // Stars
    const rng = mulberry32(42);
    for(let i=0;i<320;i++){
      const sx = rng()*W, sy = rng()*H;
      const r = rng()*1.4 + 0.2;
      const alpha = rng()*0.7 + 0.2;
      ctx.beginPath();
      ctx.arc(sx,sy,r,0,Math.PI*2);
      const hue = [200,220,260,300,180][Math.floor(rng()*5)];
      ctx.fillStyle = `hsla(${hue},80%,90%,${alpha})`;
      ctx.fill();
    }

    // Minor grid
    const minor = 40;
    ctx.strokeStyle = 'rgba(0,140,220,0.07)';
    ctx.lineWidth = 0.5;
    for(let gx=0;gx<W;gx+=minor){ ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,H); ctx.stroke(); }
    for(let gy=0;gy<H;gy+=minor){ ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(W,gy); ctx.stroke(); }

    // Major grid
    const major = 200;
    ctx.strokeStyle = 'rgba(0,180,255,0.15)';
    ctx.lineWidth = 1;
    for(let gx=0;gx<W;gx+=major){ ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,H); ctx.stroke(); }
    for(let gy=0;gy<H;gy+=major){ ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(W,gy); ctx.stroke(); }

    // Origin cross
    ctx.strokeStyle = 'rgba(0,200,255,0.25)';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(W/2,0); ctx.lineTo(W/2,H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,H/2); ctx.lineTo(W,H/2); ctx.stroke();
  }

  function mulberry32(seed){
    return function(){
      seed |= 0; seed = seed + 0x6D2B79F5 | 0;
      let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }

  window.addEventListener('resize', resize);
  resize();
})();

/* ─── 3D Playground Logic ─── */
const shapeEl = document.getElementById('shape');
let x=0, y=0, z=0, rx=0, ry=0, scale=1;

createCube();
updatePanel('Init', 0,0,0,0,0,1);
applyTransform();

/* Shape creators */
function createCube(){
  shapeEl.innerHTML = `
    <div class="face front"></div><div class="face back"></div>
    <div class="face left"></div><div class="face right"></div>
    <div class="face top"></div><div class="face bottom"></div>`;
}
function createSquare(){
  shapeEl.innerHTML = `
    <div class="square-container">
      <div class="grid-wall grid-left"></div>
      <div class="grid-wall grid-right"></div>
      <div class="grid-wall grid-bottom"></div>
    </div>`;
  rx = -20; ry = -45;
}
function createRectangle(){ shapeEl.innerHTML = `<div class="rectangle"></div>`; }
function createCircle(){ shapeEl.innerHTML = `<div class="circle"></div>`; }
function createTriangle(){ shapeEl.innerHTML = `<div class="triangle-wrap"></div>`; }

function changeShape(type){
  const prev = snap();
  x=0; y=0; z=0; rx=0; ry=0; scale=1;
  if(type==='cube')       createCube();
  if(type==='square')     createSquare();
  if(type==='rectangle')  createRectangle();
  if(type==='circle')     createCircle();
  if(type==='triangle')   createTriangle();
  updatePanel(`Shape → ${type}`, prev.x, prev.y, prev.z, prev.rx, prev.ry, prev.scale);
  applyTransform();
}

/* Apply */
function applyTransform(){
  shapeEl.style.transform =
    `translate3d(${x}px,${y}px,${z}px) scale(${scale}) rotateX(${rx}deg) rotateY(${ry}deg)`;
}

function snap(){ return {x,y,z,rx,ry,scale}; }

/* Operations */
function translate(axis, delta){
  const prev = snap();
  if(axis==='x') x+=delta;
  if(axis==='y') y+=delta;
  if(axis==='z') z+=delta;
  updatePanel(`Translate ${axis.toUpperCase()} ${delta>0?'+':''}${delta}px`, prev.x,prev.y,prev.z,prev.rx,prev.ry,prev.scale);
  applyTransform();
}

function translateCustom(axis){
  const prev = snap();
  const val = parseFloat(document.getElementById('step'+axis.toUpperCase()).value) || 0;
  if(axis==='x') x=val;
  if(axis==='y') y=val;
  if(axis==='z') z=val;
  updatePanel(`Set ${axis.toUpperCase()} = ${val}`, prev.x,prev.y,prev.z,prev.rx,prev.ry,prev.scale);
  applyTransform();
}

function rotate(axis, deg){
  const prev = snap();
  if(axis==='x') rx+=deg;
  if(axis==='y') ry+=deg;
  updatePanel(`Rotate ${axis.toUpperCase()} ${deg>0?'+':''}${deg}°`, prev.x,prev.y,prev.z,prev.rx,prev.ry,prev.scale);
  applyTransform();
}

function scaleShape(delta){
  const prev = snap();
  scale = Math.max(0.1, Math.round((scale+delta)*10)/10);
  updatePanel(`Scale ${delta>0?'+':'-'}${Math.abs(delta)}`, prev.x,prev.y,prev.z,prev.rx,prev.ry,prev.scale);
  applyTransform();
}

function resetAll(){
  const prev = snap();
  x=0; y=0; z=0; rx=0; ry=0; scale=1;
  updatePanel('Reset', prev.x,prev.y,prev.z,prev.rx,prev.ry,prev.scale);
  applyTransform();
}

/* Panel update */
function updatePanel(op, bx,by,bz,brx,bry,bsc){
  set('bef-x', bx); set('bef-y', by); set('bef-z', bz);
  set('bef-rx', brx+'°'); set('bef-ry', bry+'°');
  set('bef-sc', parseFloat(bsc).toFixed(1));
  flash('aft-x', x); flash('aft-y', y); flash('aft-z', z);
  flash('aft-rx', rx+'°'); flash('aft-ry', ry+'°');
  flash('aft-sc', parseFloat(scale).toFixed(1));
  document.getElementById('last-op').textContent = op ? `⚡ ${op}` : '';
}
function set(id,v){ document.getElementById(id).textContent = v; }
function flash(id,v){
  const el = document.getElementById(id);
  el.textContent = v;
  el.classList.remove('changed');
  void el.offsetWidth;
  el.classList.add('changed');
}

/* Mouse drag */
let dragging=false, prevMouse={x:0,y:0};
document.addEventListener('mousedown', e=>{
  if(!e.target.closest('#ctrl-panel') && !e.target.closest('#coord-panel')) dragging=true;
});
document.addEventListener('mouseup', ()=>dragging=false);
document.addEventListener('mousemove', e=>{
  if(dragging){
    const prev=snap();
    rx -= (e.clientY - prevMouse.y)*0.5;
    ry += (e.clientX - prevMouse.x)*0.5;
    updatePanel('Mouse Drag', prev.x,prev.y,prev.z,prev.rx,prev.ry,prev.scale);
    applyTransform();
  }
  prevMouse = {x:e.clientX, y:e.clientY};
});

/* Scroll zoom */
document.addEventListener('wheel', e=>{
  if(e.target.closest('#ctrl-panel') || e.target.closest('#coord-panel')) return;
  e.preventDefault();
  scaleShape(e.deltaY < 0 ? 0.1 : -0.1);
}, {passive:false});
</script>
